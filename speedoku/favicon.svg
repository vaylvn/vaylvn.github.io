  <rect x="13" y="4"  width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.13)"/>
  <rect x="22" y="4"  width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.05)"/>
  <rect x="4"  y="13" width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.05)"/>
  <rect x="13" y="13" width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.13)"/>
  <rect x="22" y="13" width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.05)"/>
  <rect x="4"  y="22" width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.05)"/>
  <rect x="13" y="22" width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.05)"/>
  <rect x="22" y="22" width="6" height="6" rx="1.5" fill="rgba(240,236,227,0.13)"/>
