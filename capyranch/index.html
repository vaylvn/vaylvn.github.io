<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapyCinema</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh;
  overflow:hidden;
  background:transparent;
}

#cinema {
  position:absolute;
  bottom:0; left:0; right:0;
  /* height set by JS based on row count */
  pointer-events:none;
}

#capy-canvas {
  position:absolute;
  bottom:0; left:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

/* Name labels — HTML so text stays crisp */
#labels {
  position:absolute;
  bottom:0; left:0; right:0;
  /* height matches canvas */
}

.capy-label {
  position:absolute;
  transform:translateX(-50%);
  font-family:'Courier New', monospace;
  font-size:10px;
  font-weight:bold;
  color:rgba(255,255,255,0.7);
  text-shadow:
     1px  0   0 rgba(0,0,0,0.9),
    -1px  0   0 rgba(0,0,0,0.9),
     0    1px 0 rgba(0,0,0,0.9),
     0   -1px 0 rgba(0,0,0,0.9);
  letter-spacing:0.02em;
  white-space:nowrap;
  pointer-events:none;
  transition:opacity 0.4s;
  opacity:0; /* fades in on spawn */
}

.capy-label.visible { opacity:1; }
</style>
</head>
<body>

<div id="cinema">
  <canvas id="capy-canvas"></canvas>
  <div id="labels"></div>
</div>

<script src="../../chat2/tmi.min.js"></script>
<script>
// ============================================================
//  CONFIG
// ============================================================
const params  = new URLSearchParams(window.location.search);
const CHANNEL = (params.get('streamer') || '').toLowerCase().trim();
const SCALE   = 3;  // 16px → 48px

// Sprite sheet
const SPRITE = {
  frameW:   16,
  frameH:   16,
  frames:   3,        // 0=neutral, 1=lean left, 2=lean right
  HAT_ANCHOR_Y: 2,    // px from top of frame where top of head sits
  fps:      3,        // fidget cycle speed (slow, subtle)
};

// Seating grid
const SEAT = {
  w:          SCALE * SPRITE.frameW,      // seat width in display px  (48)
  h:          SCALE * SPRITE.frameH,      // seat height in display px (48)
  gapX:       10,     // horizontal gap between seats
  gapY:       8,      // vertical gap between rows (perspective — back row slightly higher)
  marginX:    24,     // left/right edge margin
  maxRows:    2,      // max rows before we stop accepting new capys
  maxPerRow:  null,   // computed from screen width
};

// Sine wave bob params
const BOB = {
  idleAmp:    1.5,    // px, gentle breathing
  idleFreq:   0.0008, // hz — very slow
  reactAmp:   10,     // px, excited bob
  reactFreq:  0.008,
  reactCycles:null,   // computed per message length
};

// Tint applied to sprite to make it silhouette-ish
// Dark brown, not pure black — lets hats read against it
const TINT_COLOUR = 'rgba(15, 8, 2, 0.82)';

// Max chatters before we stop spawning new seats
const MAX_CAPYS = 40;

// ============================================================
//  STATE
// ============================================================
const capys     = new Map();   // username → CapyAudience
const seats     = [];          // { row, col, x, y, occupied: username|null }
let spriteImg   = null;
let canvasW     = 0;
let canvasH     = 0;
let lastTime    = 0;

// ============================================================
//  CANVAS
// ============================================================
const canvas  = document.getElementById('capy-canvas');
const ctx     = canvas.getContext('2d');
const labelsEl = document.getElementById('labels');

function buildSeatingGrid() {
  canvasW = window.innerWidth;

  // How many seats fit per row?
  const usable = canvasW - SEAT.marginX * 2;
  SEAT.maxPerRow = Math.floor((usable + SEAT.gapX) / (SEAT.w + SEAT.gapX));

  // Total canvas height = rows * (seat height + gap)
  canvasH = SEAT.maxRows * SEAT.h + (SEAT.maxRows - 1) * SEAT.gapY + 20; // 20px floor

  canvas.width  = canvasW;
  canvas.height = canvasH;
  ctx.imageSmoothingEnabled = false;

  document.getElementById('cinema').style.height = canvasH + 'px';
  document.getElementById('labels').style.height  = canvasH + 'px';

  // Generate seat positions
  seats.length = 0;
  for (let row = 0; row < SEAT.maxRows; row++) {
    // Front row (row 0) is at the bottom, back row higher up
    const rowY = canvasH - SEAT.h - row * (SEAT.h + SEAT.gapY);
    for (let col = 0; col < SEAT.maxPerRow; col++) {
      const seatX = SEAT.marginX + col * (SEAT.w + SEAT.gapX) + SEAT.w / 2;
      seats.push({ row, col, x: seatX, y: rowY, occupied: null });
    }
  }
}

// ============================================================
//  CAPY AUDIENCE MEMBER
// ============================================================
class CapyAudience {
  constructor(username, seat) {
    this.username   = username;
    this.seat       = seat;
    seat.occupied   = username;

    // Sprite animation
    this.frame      = 0;
    this.frameTime  = 0;
    // Fidget sequence: mostly neutral, occasional lean
    this.fidgetSeq  = buildFidgetSeq();
    this.fidgetIdx  = 0;
    this.fidgetTime = 0;
    this.fidgetDur  = randBetween(2000, 5000); // ms per fidget step

    // Bob (sine wave)
    this.bobOffset  = 0;       // current y offset from bob
    this.bobPhase   = Math.random() * Math.PI * 2; // randomise phase so they're not all in sync
    this.reacting   = false;
    this.reactTime  = 0;
    this.reactDur   = 0;

    // Spawn animation — slide up from below
    this.spawnY     = canvasH + SEAT.h; // start below screen
    this.targetY    = seat.y;
    this.currentY   = this.spawnY;
    this.spawning   = true;

    // Label
    this.labelEl    = this.createLabel();
    labelsEl.appendChild(this.labelEl);
  }

  createLabel() {
    const el = document.createElement('div');
    el.className = 'capy-label';
    el.textContent = this.username;
    return el;
  }

  react(msgLength) {
    // Map message length to number of bob cycles
    const cycles    = msgLength < 20 ? 1 : msgLength < 60 ? 2 : 4;
    this.reacting   = true;
    this.reactTime  = 0;
    this.reactDur   = cycles * (1000 / BOB.reactFreq / 1000); // ms for N cycles
    // Reacting resets bob phase to 0 so bob starts upward
    this.bobPhase   = -Math.PI / 2;
  }

  update(dt, ts) {
    // Spawn slide-in
    if (this.spawning) {
      const speed = 0.6; // px per ms
      this.currentY -= speed * dt;
      if (this.currentY <= this.targetY) {
        this.currentY = this.targetY;
        this.spawning = false;
        // Fade in label once seated
        setTimeout(() => this.labelEl.classList.add('visible'), 100);
      }
    }

    // Fidget frame cycling
    this.fidgetTime += dt;
    if (this.fidgetTime >= this.fidgetDur) {
      this.fidgetTime = 0;
      this.fidgetIdx  = (this.fidgetIdx + 1) % this.fidgetSeq.length;
      this.frame      = this.fidgetSeq[this.fidgetIdx];
      this.fidgetDur  = randBetween(800, 3000);
    }

    // Bob sine wave
    if (this.reacting) {
      this.reactTime += dt;
      const amp  = BOB.reactAmp;
      const freq = BOB.reactFreq;
      this.bobOffset = -Math.abs(Math.sin(this.bobPhase + this.reactTime * freq * Math.PI * 2)) * amp;
      if (this.reactTime >= this.reactDur) {
        this.reacting  = false;
        this.reactTime = 0;
        this.bobOffset = 0;
        // Re-randomise idle phase
        this.bobPhase  = Math.random() * Math.PI * 2;
      }
    } else {
      // Gentle idle breathing bob
      this.bobOffset = Math.sin(this.bobPhase + ts * BOB.idleFreq * Math.PI * 2) * BOB.idleAmp;
    }

    // Update label position
    const drawY = this.currentY + this.bobOffset;
    this.labelEl.style.left   = this.seat.x + 'px';
    this.labelEl.style.bottom = (canvasH - drawY - 2) + 'px'; // just above sprite top
  }

  draw(ts) {
    if (!spriteImg) {
      drawPlaceholder(ctx, this);
      return;
    }

    const sx = this.frame * SPRITE.frameW;
    const sw = SPRITE.frameW;
    const sh = SPRITE.frameH;
    const dw = sw * SCALE;
    const dh = sh * SCALE;
    const dx = Math.round(this.seat.x - dw / 2);
    const dy = Math.round(this.currentY + this.bobOffset);

    // Draw sprite
    ctx.drawImage(spriteImg, sx, 0, sw, sh, dx, dy, dw, dh);

    // Apply dark tint on top — preserves hat colours drawn after
    ctx.fillStyle = TINT_COLOUR;
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillRect(dx, dy, dw, dh);
    ctx.globalCompositeOperation = 'source-over';

    // Hat — Phase 2
    // Hat would draw here at dx, dy + (HAT_ANCHOR_Y * SCALE) - hatH
    // with no tint so full colour shows
  }

  remove() {
    this.seat.occupied = null;
    this.labelEl.remove();
  }
}

// ============================================================
//  PLACEHOLDER — rendered when sprite not loaded
// ============================================================
function drawPlaceholder(ctx, capy) {
  const dw = SPRITE.frameW * SCALE;
  const dh = SPRITE.frameH * SCALE;
  const dx = Math.round(capy.seat.x - dw / 2);
  const dy = Math.round(capy.currentY + capy.bobOffset);

  // Dark silhouette body
  ctx.fillStyle = '#1a0f05';

  // Head
  ctx.fillRect(dx + 6,  dy + 6,  dw - 12, dh - 10);
  // Ear left
  ctx.fillRect(dx + 4,  dy + 2,  6,       8);
  // Ear right
  ctx.fillRect(dx + dw - 10, dy + 2, 6,   8);
  // Shoulders
  ctx.fillRect(dx + 2,  dy + dh - 8, dw - 4, 8);
}

// ============================================================
//  FIDGET SEQUENCE GENERATOR
// ============================================================
function buildFidgetSeq() {
  // Mostly neutral (frame 0), occasional lean left (1) or right (2)
  const seq = [0, 0, 0, 0, 0];
  // Randomly sprinkle in a lean
  const leanAt = Math.floor(Math.random() * 5);
  seq[leanAt] = Math.random() < 0.5 ? 1 : 2;
  return seq;
}

// ============================================================
//  SEAT SELECTION — weighted random with social clustering
// ============================================================
function pickSeat() {
  const free = seats.filter(s => !s.occupied);
  if (free.length === 0) return null;

  // Score each free seat — prefer seats near occupied ones (social)
  // but add randomness so it's not always perfectly clustered
  const scored = free.map(seat => {
    const neighbours = seats.filter(s =>
      s.occupied &&
      Math.abs(s.col - seat.col) <= 2 &&
      s.row === seat.row
    ).length;
    // Base score + neighbour bonus + random noise
    const score = Math.random() * 10 + neighbours * 3;
    return { seat, score };
  });

  // Sort by score descending, pick from top 3 to keep some randomness
  scored.sort((a, b) => b.score - a.score);
  const topN = scored.slice(0, Math.min(3, scored.length));
  return topN[Math.floor(Math.random() * topN.length)].seat;
}

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.clearRect(0, 0, canvasW, canvasH);

  // Sort by row so back row draws first (behind front row)
  const sorted = [...capys.values()].sort((a, b) => b.seat.row - a.seat.row);
  for (const capy of sorted) {
    capy.update(dt, ts);
    capy.draw(ts);
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
//  CAPY MANAGEMENT
// ============================================================
function getOrCreateCapy(username) {
  if (capys.has(username)) return capys.get(username);
  if (capys.size >= MAX_CAPYS) return null;

  const seat = pickSeat();
  if (!seat) return null;

  const capy = new CapyAudience(username, seat);
  capys.set(username, capy);
  return capy;
}

function onChatMessage(username, message) {
  const capy = getOrCreateCapy(username);
  if (!capy) return;
  capy.react(message.length);
}

// ============================================================
//  UTILS
// ============================================================
function randBetween(min, max) {
  return min + Math.random() * (max - min);
}

// ============================================================
//  SPRITE LOADING
// ============================================================
function loadSprite() {
  spriteImg = new Image();
  spriteImg.onload  = () => console.log('CapyCinema: sprite loaded');
  spriteImg.onerror = () => { console.warn('CapyCinema: capy.png not found, using placeholder'); spriteImg = null; };
  spriteImg.src = 'capy.png';
}

// ============================================================
//  TWITCH IRC
// ============================================================
function connectToChat(channel) {
  if (typeof tmi === 'undefined') {
    console.error('CapyCinema: tmi.js not loaded');
    return;
  }

  const client = new tmi.Client({ channels: [channel] });
  client.connect().catch(e => console.error('CapyCinema: connect failed', e));

  client.on('message', (ch, tags, message, self) => {
    if (self) return;
    const username = (tags['display-name'] || tags.username || '').toLowerCase();
    onChatMessage(username, message);
  });
}

// ============================================================
//  INIT
// ============================================================
window.addEventListener('resize', () => {
  buildSeatingGrid();
});

buildSeatingGrid();
loadSprite();

if (CHANNEL) {
  connectToChat(CHANNEL);
  // Demo capys for preview — remove in prod or gate behind !channel
} else {
  // No channel — spawn demo audience so streamer can preview
  const demoNames = ['valonvn','capy_fan','tophatcapy','lurker99','swausage','pixelcapy','noodlearms'];
  demoNames.forEach((n, i) => setTimeout(() => {
    const c = getOrCreateCapy(n);
    // Stagger demo reacts
    if (c) setTimeout(() => c.react(n.length * 8), 1000 + i * 400);
  }, i * 600));
}

requestAnimationFrame(ts => { lastTime = ts; gameLoop(ts); });
</script>
</body>
</html>
